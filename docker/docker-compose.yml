version: '3.5'

services:
  postgres:
    container_name: cotton_postgres_container
    image: postgres:latest
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: ${PGDATA}
    volumes:
      - cotton_postgres_data:${PGDATA}
    ports:
      - "5433:5432"
    networks:
      - cotton_network
    restart: unless-stopped

  pgadmin:
    container_name: cotton_pgadmin_container
    image: dpage/pgadmin4:latest
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - cotton_pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - cotton_network
    restart: unless-stopped

networks:
  cotton_network:
    driver: bridge

volumes:
  cotton_postgres_data:
  cotton_pgadmin_data: