version: '3.8'

services:
  api:
    container_name: cotton_api_container
    build: 
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
      - minio
    env_file:
      - ../.env           # main env
    environment:
      - PYTHON_EXECUTABLE=python
      - PYTHON_SCRIPT_PATH=./python/train_weights.py
    ports:
      - "3000:3000"
    networks:
      - cotton_network    
  postgres:
    container_name: cotton_postgres_container
    build: 
      context: ./postgres/postgres 
    image: postgres:17
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: ${PGDATA}
    volumes:
      - cotton_postgres_data:${PGDATA}
    ports:
      - "5433:5432"
    networks:
      - cotton_network
      
  pgadmin:
    container_name: cotton_pgadmin_container
    image: dpage/pgadmin4:latest
    restart: unless-stopped
    depends_on:
      - postgres
    env_file:
      - .env
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - cotton_pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - cotton_network

  # --- STORAGE SECTION ---
  minio:
    container_name: minio_local
    image: quay.io/minio/minio:RELEASE.2025-04-03T14-56-28Z
    restart: unless-stopped
    command: server --console-address ":9001" /data
    env_file:
      - .env
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - cotton_network

  # --- CACHE SECTION ---
  redis:
    container_name: cotton_redis_container
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379" 
    volumes:
      - cotton_redis_data:/data 
    networks:
      - cotton_network 

networks:
  cotton_network:
    driver: bridge

volumes:
  cotton_postgres_data:
  cotton_pgadmin_data:
  minio_data:
  cotton_redis_data: 